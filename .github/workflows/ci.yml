name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  # ─── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -v -race -count=1 ./...

  # ─── Integration tests (testcontainers) ───────────────────────────────────
  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run DynamoDB integration tests (LocalStack)
        run: go test -tags integration -v -timeout 300s ./kvs/dynamodb/... -run "^TestIntegration_"

      - name: Run Redis integration tests
        run: go test -tags integration -v -timeout 300s ./kvs/redis/... -run "^TestIntegration_"
